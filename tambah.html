<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tambah Data Guru</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Form Tambah Data Guru</h1>

    <form id="formTambah">

      <label>NIP</label>
      <input type="text" id="nip">

      <label>Nama</label>
      <input type="text" id="nama">

      <label>Jenis Kelamin</label>
      <select type="text" id="jeniskelamin">
      <option value="pilih jenis kelamin">pilih jenis kelamin</option>
      <option value="laki-laki">laki-laki</option>
      <option value="perempuan">perempuan</option>
     </select>
  
</select>
      <label>Tanggal Lahir</label>
      <input type="text" id="tgllahir">

      <label>Mapel</label>
      <input type="text" id="mapel">

      <label>Alamat</label>
      <input type="text" id="alamat">

      <label>No Telepon</label>
      <input type="text" id="notlpn">

      <label>Email</label>
      <input type="text" id="email">

      <label>Pendidikan Terakhir</label>
      <input type="text" id="pendidikan_terakhir">

      <button type="submit">Simpan</button>

    </form>

    <br>
    <a href="daftar.html">Data Guru</a>

  </div>

  <script type="module">

    import { tambahdataguru } from './main.js'

    const formTambah = document.getElementById('formTambah')

    formTambah.addEventListener('submit', function (e) {
      e.preventDefault()

      const nip = document.getElementById('nip').value
      const nama = document.getElementById('nama').value
      const jeniskelamin = document.getElementById('jeniskelamin').value
      const tgllahir = document.getElementById('tgllahir').value
      const mapel = document.getElementById('mapel').value
      const alamat = document.getElementById('alamat').value
      const notlpn = document.getElementById('notlpn').value
      const email = document.getElementById('email').value
      const pendidikan_terakhir = document.getElementById('pendidikan_terakhir').value

      tambahdataguru(
        nip,
        nama,
        jeniskelamin,
        tgllahir,
        mapel,
        alamat,
        notlpn,
        email,
        pendidikan_terakhir
      )

      formTambah.reset()
    })

  </script>

</body>

</html>
