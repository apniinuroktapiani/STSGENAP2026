<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Edit Data Guru</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Form Edit Data Guru</h1>

<form id="formubah">

<label>NIP</label>
<input type="text" id="nip" required>

<label>Nama</label>
<input type="text" id="nama" required>

<label>Jenis Kelamin</label>
<select id="jeniskelamin" required>
<option value="">Pilih Jenis Kelamin</option>
<option value="L">Laki-laki</option>
<option value="P">Perempuan</option>
</select>

<label>Tanggal Lahir</label>
<input type="date" id="tgllahir" required>

<label>Mapel</label>
<input type="text" id="mapel" required>

<label>Alamat</label>
<input type="text" id="alamat" required>

<label>No Telepon</label>
<input type="text" id="notlpn" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Pendidikan Terakhir</label>
<input type="text" id="pendidikan_terakhir" required>

<button type="submit">Simpan</button>

<br><br>
<a href="daftar.html">Kembali ke Daftar Guru</a>

</form>

</div>


<script type="module">

import { ambilDataGuru, ubahdataguru } from './main.js'

// ambil id dari URL
const urlparams = new URLSearchParams(window.location.search)
const iddataguru = urlparams.get('id')

// ambil data guru
const dataguru = await ambilDataGuru(iddataguru)

// cek jika data tidak ada
if (!dataguru) {
alert("Data guru tidak ditemukan")
window.location.href = "daftar.html"
}

// isi form dengan data lama
document.getElementById("nip").value = dataguru.nip
document.getElementById("nama").value = dataguru.nama
document.getElementById("jeniskelamin").value = dataguru.jeniskelamin
document.getElementById("tgllahir").value = dataguru.tgllahir
document.getElementById("mapel").value = dataguru.mapel
document.getElementById("alamat").value = dataguru.alamat
document.getElementById("notlpn").value = dataguru.notlpn
document.getElementById("email").value = dataguru.email
document.getElementById("pendidikan_terakhir").value = dataguru.pendidikan_terakhir

// submit form
const formubah = document.getElementById("formubah")

formubah.addEventListener("submit", async function(e){

e.preventDefault()

await ubahdataguru(iddataguru)

})

</script>

</body>
</html>
